<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Div centrale adattivo</title>
        <script>
        let resizeTimeout;
        function checkScreenSize() 
        {
            if (document.documentElement.clientWidth >= 600) 
            {
                window.location.href = "index.html";
            }
        }

        window.addEventListener("load", checkScreenSize);

        window.addEventListener("resize", () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(checkScreenSize, 200); // aspetta 200ms dall’ultimo resize
        });
        </script>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;display=swap" rel="stylesheet">

            html, body

            }
            .este
            {
                width: calc(100% - 6vmax);
                min-height: calc(35vmax - 6vmax);
                height: auto;
                padding: 3vmax;
            }
            .inte
            {
                width: 100%;
                min-height: calc(35vmax - 6vmax);
                height: auto;
                display: flex;
                align-items: stretch;
            }
            div.imma
            {
                width: auto;
                height: calc(35vmax - 6vmax);
                background-color: transparent;
            }
            img.imma
            {

                height: 40%;
            }
           .nome {

                font-weight: 700;

            .dati

                font-size: clamp(13px, 1vmax, 36px);
                margin-top: 0;
                text-decoration: none;
                display: block; 
                margin-bottom: 0.3vmax;
            }
        </style>
